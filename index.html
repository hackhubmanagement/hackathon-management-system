<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackathon Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="login-page">
    <!-- Dark Mode Toggle -->
    <div class="dark-mode-toggle" onclick="toggleDarkMode()">
        <i class="fas fa-sun"></i>
        <i class="fas fa-moon"></i>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1><i class="fas fa-code"></i> HackHub</h1>
                <p>Innovate · Create · Collaborate</p>
            </div>

            <!-- Login Section -->
            <div id="loginSection">
                <div class="login-tabs">
                    <button class="tab-btn active" onclick="switchTab('student')">
                        <i class="fas fa-user-graduate"></i> Student Login
                    </button>
                    <button class="tab-btn" onclick="switchTab('admin')">
                        <i class="fas fa-user-tie"></i> Admin Login
                    </button>
                </div>

                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="email" placeholder="your.email@college.edu" required>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <div class="forgot-password">
                            <a href="#" onclick="showForgotPassword()">
                                <i class="fas fa-question-circle"></i> Forgot Password?
                            </a>
                        </div>
                    </div>

                    <button type="submit" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>

                    <p class="register-link" id="registerLinkContainer">
                        New user?
                        <a href="#" onclick="showRegistration()">
                            Register as Student <i class="fas fa-arrow-right"></i>
                        </a>
                    </p>
                </form>
            </div>

            <!-- Registration Section -->
            <div id="registrationSection" style="display: none;">
                <div class="login-header">
                    <h2 id="registrationTitle">Student Registration</h2>
                    <p>Student ID will be auto-generated</p>
                </div>

                <form onsubmit="handleRegistration(event)">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" id="regName" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-university"></i> College Name</label>
                        <input type="text" id="regCollegeName" placeholder="Enter your college name" required>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="regEmail" placeholder="your.email@college.edu" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Password</label>
                            <input type="password" id="regPassword" placeholder="Create password" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Confirm</label>
                            <input type="password" id="regConfirmPassword" placeholder="Confirm password" required>
                        </div>
                    </div>

                    <div id="studentRegFields">
                        <div class="form-row">
                            <div class="form-group">
                                <label><i class="fas fa-building"></i> Department</label>
                                <select id="regDepartment">
                                    <option value="">Select Department</option>
                                    <option value="Computer Science">Computer Science</option>
                                    <option value="Information Technology">Information Technology</option>
                                    <option value="Electronics">Electronics</option>
                                    <option value="Mechanical">Mechanical</option>
                                    <option value="Civil">Civil</option>
                                    <option value="Electrical">Electrical</option>
                                    <option value="MBA">MBA</option>
                                    <option value="BCA">BCA</option>
                                    <option value="MCA">MCA</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-calendar"></i> Year</label>
                                <select id="regYear">
                                    <option value="">Select Year</option>
                                    <option value="1">1st Year</option>
                                    <option value="2">2nd Year</option>
                                    <option value="3">3rd Year</option>
                                    <option value="4">4th Year</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="login-btn">
                        <i class="fas fa-user-plus"></i> Register
                    </button>

                    <p class="register-link">
                        Already have an account?
                        <a href="#" onclick="showLogin()">
                            Login here <i class="fas fa-arrow-right"></i>
                        </a>
                    </p>
                </form>
            </div>

            <!-- Forgot Password Section -->
            <div id="forgotSection" style="display: none;">
                <div class="login-header">
                    <h2><i class="fas fa-key"></i> Reset Password</h2>
                    <p>Enter your email and new password</p>
                </div>

                <form onsubmit="handleForgotPassword(event)">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="forgotEmail" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> New Password</label>
                        <input type="password" id="forgotPassword" placeholder="Enter new password" required>
                    </div>

                    <button type="submit" class="login-btn">
                        <i class="fas fa-sync"></i> Update Password
                    </button>

                    <p class="register-link">
                        Remember password?
                        <a href="#" onclick="showLogin()">
                            Login here <i class="fas fa-arrow-right"></i>
                        </a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Auto-redirect if already logged in
        window.addEventListener('load', () => {
            const currentUser = localStorage.getItem('currentUser');
            const userType = localStorage.getItem('userType');

            if (currentUser && userType) {
                if (userType === 'admin') {
                    window.location.href = 'admin.html';
                } else if (userType === 'student') {
                    window.location.href = 'student.html';
                }
            }
        });

        // Tab switching
        function switchTab(type) {
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            const emailInput = document.getElementById('email');
            const registerLinkContainer = document.getElementById('registerLinkContainer');

            if (type === 'admin') {
                emailInput.placeholder = 'admin@college.edu';
                registerLinkContainer.innerHTML = '';
            } else {
                emailInput.placeholder = 'your.email@college.edu';
                registerLinkContainer.innerHTML = 'New user? <a href="#" onclick="showRegistration()">Register as Student <i class="fas fa-arrow-right"></i></a>';
            }
        }

        // Show/Hide sections
        function showRegistration() {
            const activeTab = document.querySelector('.tab-btn.active').textContent;
            const regTitle = document.getElementById('registrationTitle');
            const studentFields = document.getElementById('studentRegFields');

            if (activeTab.includes('Admin')) {
                regTitle.textContent = 'Admin Registration';
                studentFields.style.display = 'none';
            } else {
                regTitle.textContent = 'Student Registration';
                studentFields.style.display = 'block';
            }

            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('registrationSection').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('registrationSection').style.display = 'none';
            document.getElementById('forgotSection').style.display = 'none';
        }

        function showForgotPassword() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('registrationSection').style.display = 'none';
            document.getElementById('forgotSection').style.display = 'block';
        }

        // Generate random Student ID between 100001 and 999999
        function generateStudentId() {
            return Math.floor(Math.random() * (999999 - 100001 + 1)) + 100001;
        }

        // Handle Login
        async function handleLogin(event) {
            event.preventDefault();

            let activeTab = document.querySelector('.tab-btn.active').textContent;
            let expectedRole = activeTab.includes('Admin') ? 'admin' : 'student';

            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            let formData = new FormData();
            formData.append("email", email);
            formData.append("password", password);

            try {
                let response = await fetch("login.php", {
                    method: "POST",
                    body: formData
                });

                let text = await response.text();
                console.log("Server Response:", text);

                let result;
                try {
                    result = JSON.parse(text);
                } catch (e) {
                    alert("Server error. Please try again.");
                    console.error("Invalid JSON:", text);
                    return;
                }

                /* ADMIN LOGIN */
                if (result.type === "admin") {
                    if (expectedRole !== "admin") {
                        alert("Please login through Admin Login tab.");
                        return;
                    }

                    localStorage.setItem("userType", "admin");
                    localStorage.setItem("currentUser", JSON.stringify(result));
                    window.location.href = "admin.html";
                    return;
                }

                /* STUDENT LOGIN */
                if (result.type === "student") {
                    if (expectedRole !== "student") {
                        alert("Please login through Student Login tab.");
                        return;
                    }

                    localStorage.setItem("userType", "student");
                    localStorage.setItem("currentUser", JSON.stringify(result));
                    window.location.href = "student.html";
                    return;
                }

                /* INVALID LOGIN */
                if (result.type === "invalid") {
                    alert("Invalid email or password");
                    return;
                }

            } catch (error) {
                console.error("Login Error:", error);
                alert("Server error. Please try again.");
            }
        }

        // Handle Registration
        async function handleRegistration(event) {
            event.preventDefault();

            let name = document.getElementById("regName").value;
            let collegeName = document.getElementById("regCollegeName").value;
            let email = document.getElementById("regEmail").value;
            let password = document.getElementById("regPassword").value;
            let confirmPassword = document.getElementById("regConfirmPassword").value;
            let department = document.getElementById("regDepartment").value;
            let year = document.getElementById("regYear").value;

            if (password !== confirmPassword) {
                alert("Passwords do not match");
                return;
            }

            if (!collegeName) {
                alert("Please enter your college name");
                return;
            }

            let formData = new FormData();
            formData.append("name", name);
            formData.append("college_name", collegeName);
            formData.append("email", email);
            formData.append("password", password);
            formData.append("department", department);
            formData.append("year", year);

            try {
                let response = await fetch("register.php", {
                    method: "POST",
                    body: formData
                });

                let result = await response.text();

                if (result.trim() === "success") {
                    alert("Registration successful!\nPlease login.");
                    showLogin();
                }
                else if (result.trim() === "email_exists") {
                    alert("Email already exists");
                }
                else {
                    alert(" Registration failed");
                }

            } catch (error) {
                console.error("Registration Error:", error);
                alert("Server error. Try again.");
            }
        }

        // Handle Forgot Password
        async function handleForgotPassword(event) {
            event.preventDefault();

            let email = document.getElementById("forgotEmail").value;
            let newPassword = document.getElementById("forgotPassword").value;

            let formData = new FormData();
            formData.append("email", email);
            formData.append("new_password", newPassword);

            try {
                let response = await fetch("forgot_password.php", {
                    method: "POST",
                    body: formData
                });

                let result = await response.text();
                alert(result);

                if (result.includes("success")) {
                    showLogin();
                }
            } catch (error) {
                alert("Error resetting password");
                console.error(error);
            }
        }



        document.addEventListener("DOMContentLoaded", function () {

            const mode = localStorage.getItem("authMode");

            if (mode === "register") {
                showRegisterForm();
            } else {
                showLoginForm();
            }

        });




    </script>

    <script>



        document.addEventListener("DOMContentLoaded", function () {

            const mode = localStorage.getItem("authMode");

            if (mode === "register") {
                showRegisterForm();
            } else {
                showLoginForm();
            }

            // clear after use
            localStorage.removeItem("authMode");
        });
        function showLoginForm() {
            document.getElementById("loginSection").style.display = "block";
            document.getElementById("registrationSection").style.display = "none";
            document.getElementById("forgotSection").style.display = "none";
        }

        function showRegisterForm() {
            document.getElementById("loginSection").style.display = "none";
            document.getElementById("registrationSection").style.display = "block";
            document.getElementById("forgotSection").style.display = "none";
        }

        // Dark Mode Toggle
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }

        // Load dark mode preference
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }

    </script>
</body>

</html>
